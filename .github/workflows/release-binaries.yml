# Build & publish the per-platform FFmpeg + ImageMagick bundles consumed by
# {{ffmpeg/imagemagick project}}'s first-boot downloader (Ticket 1.4).
#
# Output: for each platform an archive `binaries-<slug>.<ext>` containing
# `bin/{ffmpeg,ffprobe,magick}` (+ `lib/` on macOS), uploaded to the `binaries-v1`
# release, plus a `SHA256SUMS` file. Copy the four digests from SHA256SUMS into
# `binaries_sha256()` in the app's `src-tauri/src/downloader/assets.rs`.
#
# NOTE: this is a first cut. It cannot be verified outside CI — expect a run or two
# of shakeout, with macOS (especially `magick`) the most likely first failure.
#
# REPRODUCIBILITY: the FFmpeg sources below track "latest"/"snapshot", so each run
# yields different bytes and therefore different digests (which the app pins). For a
# stable release, pin BtbN/Martin-Riedl to specific versioned URLs before relying on
# this in production.
#
# LICENSING: BtbN builds are GPL; shipping them publicly means honoring FFmpeg's
# GPL terms (include the license text — done below — and be ready to provide source).

name: Build & publish media binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish/update"
        default: "binaries-v1"
        required: true

permissions:
  contents: write # create/update releases

env:
  # FFmpeg/ffprobe pinned to specific upstream builds for reproducibility (the
  # previous `latest`/`snapshot` pointers drifted on every run). Bump these to
  # re-pin; the published binaries-v1 release is the durable artifact users fetch,
  # so an upstream prune of an old build only breaks a *re-build*, not downloads.
  BTBN_BASE: "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-29-14-25"
  BTBN_LINUX: "ffmpeg-N-125350-g3f6bf150cb-linux64-gpl.tar.xz"
  BTBN_WIN: "ffmpeg-N-125350-g3f6bf150cb-win64-gpl.zip"
  # Martin-Riedl pins are per-arch (each arch has its own build id).
  MR_MACOS_ARM64: "https://ffmpeg.martin-riedl.de/download/macos/arm64/1781693612_N-125070-gd69e8d0a95"
  MR_MACOS_AMD64: "https://ffmpeg.martin-riedl.de/download/macos/amd64/1767299902_N-122320-g38e89fe502"
  # ImageMagick: pin ONE version and pull every artifact from GitHub Releases, which
  # keeps all assets permanently. imagemagick.org prunes version-specific downloads
  # (that pruning is exactly what 404'd the old Windows pin and the macOS source
  # tarball), so it must not be used for reproducible pinned builds. The magick step
  # builds these URLs from IM_VER: Linux = gcc AppImage, Windows = portable-Q16 .7z,
  # macOS = the source tag tarball (which ships a prebuilt ./configure) built
  # --without-modules. Bump IM_VER to re-pin; the app pins the published bundle SHA.
  IM_VER: "7.1.2-27"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { slug: linux-x86_64, os: ubuntu-22.04, ext: tar.gz }
          - { slug: windows-x86_64, os: windows-latest, ext: zip }
          # x86_64 is built on the arm64 runner under Rosetta (Intel macOS runners
          # are scarce/being retired); see the magick step for how.
          - { slug: macos-x86_64, os: macos-14, ext: tar.gz }
          - { slug: macos-aarch64, os: macos-14, ext: tar.gz }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Assemble FFmpeg + ffprobe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage/bin
          case "${{ matrix.slug }}" in
            linux-x86_64)
              curl -fsSL "$BTBN_BASE/$BTBN_LINUX" -o ff.tar.xz
              tar xf ff.tar.xz
              cp ffmpeg-*-linux64-gpl/bin/ffmpeg  stage/bin/ffmpeg
              cp ffmpeg-*-linux64-gpl/bin/ffprobe stage/bin/ffprobe
              ;;
            windows-x86_64)
              curl -fsSL "$BTBN_BASE/$BTBN_WIN" -o ff.zip
              7z x ff.zip >/dev/null
              cp ffmpeg-*-win64-gpl/bin/ffmpeg.exe  stage/bin/ffmpeg.exe
              cp ffmpeg-*-win64-gpl/bin/ffprobe.exe stage/bin/ffprobe.exe
              ;;
            macos-x86_64)
              for b in ffmpeg ffprobe; do
                curl -fsSL "$MR_MACOS_AMD64/$b.zip" -o "$b.zip"
                unzip -o "$b.zip" -d stage/bin
              done
              ;;
            macos-aarch64)
              for b in ffmpeg ffprobe; do
                curl -fsSL "$MR_MACOS_ARM64/$b.zip" -o "$b.zip"
                unzip -o "$b.zip" -d stage/bin
              done
              ;;
          esac

      - name: Assemble ImageMagick (magick)
        shell: bash
        run: |
          set -euo pipefail

          # macOS `magick` is built FROM SOURCE with `--without-modules` (see the
          # helper below). The previous approach — copy Homebrew's `magick` and run
          # dylibbundler — shipped a *modules* build: ImageMagick's coders (png, jpeg,
          # …) are separate runtime modules under share/ImageMagick that are dlopen'd,
          # and dylibbundler follows only *linked* dylibs, not dlopen'd modules. So the
          # bundle carried the binary + core dylibs but none of the coders or config.
          # On a user's Mac that surfaced (Ticket 3.3.1 shakeout) as:
          #   magick: NoDecodeDelegateForThisImageFormat `…/foo.png' @ ReadImage
          #   magick: UnableToOpenConfigureFile `delegates.xml' @ GetConfigureOptions
          # `--without-modules` compiles every coder INTO libMagickCore, so the single
          # binary decodes PNG/JPEG/… with no runtime module or config directory. We
          # still dylibbundler the *delegate* dylibs (libpng, jpeg-turbo, …) into
          # stage/lib with @executable_path/../lib install names for relocatability.
          #
          # NOTE: the source build + delegate detection can only be verified in CI —
          # expect a shakeout run; the smoke test below fails loud if a coder is missing.
          #
          # All three ImageMagick artifacts come from GitHub Releases (permanent),
          # pinned to $IM_VER (set in the workflow `env:`): Linux gcc AppImage, Windows
          # portable-Q16 .7z, and the source tag tarball for the macOS build. The tag
          # tarball ships a prebuilt ./configure, so no autotools bootstrap is needed.
          IM_GH="https://github.com/ImageMagick/ImageMagick"
          IM_LINUX_URL="$IM_GH/releases/download/$IM_VER/ImageMagick-$IM_VER-gcc-x86_64.AppImage"
          IM_WINDOWS_URL="$IM_GH/releases/download/$IM_VER/ImageMagick-$IM_VER-portable-Q16-x64.7z"
          IM_SRC_URL="$IM_GH/archive/refs/tags/$IM_VER.tar.gz"

          # Build a self-contained `magick` from source.
          #   $1 RUN     — arch prefix: "" (native arm64) or "arch -x86_64" (Rosetta)
          #   $2 BREW    — brew binary: "brew" (arm64) or "/usr/local/bin/brew" (Intel)
          #   $3 BUNDLER — dylibbundler path matching the target arch
          build_magick_from_source() {
            local RUN="$1" BREW="$2" BUNDLER="$3"
            export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1
            # Delegate libraries the built-in coders link against, plus build tools.
            local DEPS="pkg-config libpng jpeg-turbo libtiff webp libheif little-cms2 freetype"
            # shellcheck disable=SC2086
            $RUN $BREW install $DEPS dylibbundler

            curl -fsSL "$IM_SRC_URL" -o im-src.tar.gz
            mkdir -p im-src && tar xf im-src.tar.gz -C im-src --strip-components=1

            local INSTALL="$GITHUB_WORKSPACE/im-install"
            # keg-only delegates (e.g. jpeg-turbo) don't symlink their .pc into the
            # main prefix, so add each delegate's own pkgconfig dir explicitly.
            local PC=""
            for f in $DEPS; do
              [ "$f" = "pkg-config" ] && continue
              PC="$PC:$($RUN $BREW --prefix "$f")/lib/pkgconfig"
            done
            export PKG_CONFIG_PATH="${PC#:}:$($RUN $BREW --prefix)/lib/pkgconfig"

            pushd im-src >/dev/null
            # shellcheck disable=SC2086
            $RUN ./configure \
              --prefix="$INSTALL" \
              --without-modules \
              --disable-docs \
              --disable-dependency-tracking \
              --disable-openmp \
              --without-x \
              --without-magick-plus-plus \
              --with-png --with-jpeg --with-tiff --with-webp --with-heic \
              --with-freetype --with-lcms2
            # shellcheck disable=SC2086
            $RUN make -j"$(sysctl -n hw.ncpu)"
            # shellcheck disable=SC2086
            $RUN make install
            popd >/dev/null

            mkdir -p stage/bin stage/lib
            cp "$INSTALL/bin/magick" stage/bin/magick
            # shellcheck disable=SC2086
            $RUN "$BUNDLER" -od -b -x stage/bin/magick -d stage/lib -p '@executable_path/../lib/'
          }

          # Prove the result is genuinely self-contained: NOT a modules build, and it
          # round-trips a PNG (the exact operation that failed) with ImageMagick env
          # unset and from a scratch dir — mirroring a clean user machine.
          verify_magick() {
            if stage/bin/magick -version | grep -q 'Modules'; then
              echo "ERROR: magick is still a modules build; runtime coders would be missing"
              stage/bin/magick -version; exit 1
            fi
            local m="$GITHUB_WORKSPACE/stage/bin/magick" t
            t="$(mktemp -d)"
            ( cd "$t" \
              && env -u MAGICK_HOME -u MAGICK_CONFIGURE_PATH "$m" -size 8x8 xc:red png:in.png \
              && env -u MAGICK_HOME -u MAGICK_CONFIGURE_PATH "$m" in.png -resize 4x4 png:out.png )
            echo "magick self-contained PNG round-trip OK"
          }

          case "${{ matrix.slug }}" in
            linux-x86_64)
              # Official AppImage = a single self-contained `magick` (coders built in).
              # (Runs without FUSE via APPIMAGE_EXTRACT_AND_RUN on hosts lacking it.)
              curl -fsSL "$IM_LINUX_URL" -o stage/bin/magick
              chmod +x stage/bin/magick
              ;;
            windows-x86_64)
              # Official portable build = self-contained magick.exe.
              curl -fsSL "$IM_WINDOWS_URL" -o im.7z
              7z x im.7z -oim >/dev/null
              cp "$(find im -iname 'magick.exe' | head -1)" stage/bin/magick.exe
              ;;
            macos-aarch64)
              build_magick_from_source "" "brew" "dylibbundler"
              verify_magick
              ;;
            macos-x86_64)
              # Built on the arm64 runner under Rosetta against a SECOND, Intel
              # Homebrew prefix at /usr/local (the native arm64 brew at /opt/homebrew
              # is left alone), so magick + its bundled dylibs are genuinely x86_64.
              # Avoids the scarce/retiring Intel macOS runner pool.
              softwareupdate --install-rosetta --agree-to-license || true
              if [ ! -x /usr/local/bin/brew ]; then
                arch -x86_64 /bin/bash -c \
                  "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
              fi
              build_magick_from_source "arch -x86_64" "/usr/local/bin/brew" "/usr/local/bin/dylibbundler"
              # Fail loudly if Rosetta somehow produced an arm64 binary.
              file stage/bin/magick | grep -q 'x86_64' \
                || { echo "ERROR: bundled magick is not x86_64"; file stage/bin/magick; exit 1; }
              verify_magick
              ;;
          esac

      - name: Add license texts (FFmpeg is GPL)
        shell: bash
        run: |
          mkdir -p stage/licenses
          curl -fsSL "https://www.gnu.org/licenses/gpl-3.0.txt" -o stage/licenses/FFmpeg-GPL-3.0.txt || true
          curl -fsSL "https://imagemagick.org/script/license.php" -o stage/licenses/ImageMagick-license.html || true

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x stage/bin/* 2>/dev/null || true
          out="binaries-${{ matrix.slug }}.${{ matrix.ext }}"
          # Reproducible archives: identical inputs must yield identical bytes (stable
          # SHA-256). Normalize every entry's mtime, archive in name order, and strip
          # compressor timestamps. (Runner-image tool versions can still drift bytes —
          # the published bundle is the source of truth either way.)
          export TZ=UTC
          find stage -exec touch -t 202601010000.00 {} +
          if [ "${{ matrix.ext }}" = "zip" ]; then
            # 7z stores per-file mtimes (now fixed) and orders entries by name.
            ( cd stage && 7z a -tzip -mx=9 "../$out" . >/dev/null )
          else
            # GNU tar (gtar on macOS) for --sort/--mtime/--numeric-owner; gzip -n drops
            # the gzip header's name+timestamp.
            TAR=tar
            [ "$(uname)" = Darwin ] && { HOMEBREW_NO_AUTO_UPDATE=1 brew install gnu-tar >/dev/null; TAR=gtar; }
            "$TAR" --sort=name --numeric-owner --owner=0 --group=0 \
                   --mtime='2026-01-01 00:00:00 UTC' -C stage -cf - . | gzip -n > "$out"
          fi
          ls -l "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.slug }}
          path: binaries-${{ matrix.slug }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Gather all bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum binaries-* | tee SHA256SUMS

      - name: Publish/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Media binaries (${{ inputs.tag }})
          files: |
            dist/binaries-*
            dist/SHA256SUMS
